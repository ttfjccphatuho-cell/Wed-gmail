<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lưu Gmail Online</title>
<style>
body { font-family: Arial; text-align: center; background: #f2f2f2; }
.box { background: white; width: 320px; margin: 40px auto; padding: 20px; border-radius: 10px; }
input { width: 90%; padding: 8px; margin: 5px; }
button { padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<div class="box" id="loginBox">
  <h3>Mật khẩu</h3>
  <input type="text" id="pass">
  <button onclick="login()">Vào</button>
</div>

<div class="box" id="mainBox" style="display:none;">
  <h3>Thêm Gmail</h3>
  <input type="text" id="gmail" placeholder="Nhập Gmail">
  <button onclick="addGmail()">Lưu</button>

  <h3>Danh sách</h3>
  <ul id="list"></ul>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDw736A74Ab1v7Tw6kWUf34yskjsvLS6LQ",
  authDomain: "fir-c0557.firebaseapp.com",
  databaseURL: "https://fir-c0557-default-rtdb.firebaseio.com",
  projectId: "fir-c0557",
  storageBucket: "fir-c0557.appspot.com", // kiểm tra lại trong Firebase console
  messagingSenderId: "273926995643",
  appId: "1:273926995643:web:05e1417aa2a3531d6ff39e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// DOM elements
const loginBox = document.getElementById("loginBox");
const mainBox = document.getElementById("mainBox");

const PASSWORD = "Thaithanh";

function login(){
  if(document.getElementById("pass").value === PASSWORD){
    loginBox.style.display = "none";
    mainBox.style.display = "block";
    loadGmail();
  } else alert("Sai mật khẩu");
}

function addGmail(){
  let gmail = document.getElementById("gmail").value;
  if(gmail === "") return;

  db.ref("gmails").push(gmail);
  document.getElementById("gmail").value = "";
}

function loadGmail(){
  db.ref("gmails").on("value", (snapshot)=>{
    let list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(child => {
      let li = document.createElement("li");

      let text = document.createElement("span");
      text.textContent = child.val();

      let btn = document.createElement("button");
      btn.innerHTML = "🗑️";
      btn.onclick = function(){
        db.ref("gmails/" + child.key).remove();
      };

      li.appendChild(text);
      li.appendChild(btn);

      list.appendChild(li);
    });
  });
}
</script>

</body>
</html>
